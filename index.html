<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ChillHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>🌌 ChillHub</h2>

<button onclick="showPage('chat')">💬 Chat</button>
<button onclick="showPage('games')">🎮 Games</button>
<button onclick="showPage('music')">🎵 Music Room</button>
<button onclick="showPage('profile')">👤 Profile</button>

</div>


<div class="main">

<!-- LOGIN -->

<div id="loginPage" class="page active">

<h2>Join ChillHub</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>


<!-- PROFILE SETUP -->

<div id="profile" class="page">

<h2>Your Profile</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<button onclick="saveProfile()">Save</button>

</div>


<!-- CHAT -->

<div id="chat" class="page">

<h2>Public Chat</h2>

<div id="messages"></div>

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>


<!-- GAMES -->

<div id="games" class="page">

<h2>Games</h2>

<div class="game">

<h3>Tic Tac Toe</h3>

<div id="board"></div>

<button onclick="startGame()">Start Game</button>

</div>

</div>


<!-- MUSIC ROOM -->

<div id="music" class="page">

<h2>Music Room</h2>

<input id="songURL" placeholder="Paste YouTube link">

<button onclick="playSong()">Play for everyone</button>

<iframe id="player"></iframe>

</div>


</div>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>
<script src="games.js"></script>

</body>
</html>
